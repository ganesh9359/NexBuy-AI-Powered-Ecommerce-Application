<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{brandName}} order receipt</title>
</head>
<body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,Helvetica,sans-serif;color:#0f172a;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{preheader}}</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f8fafc;">
    <tr>
      <td align="center" style="padding:28px 14px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;background:#ffffff;border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(15,23,42,0.08);">
          <tr>
            <td style="background:linear-gradient(135deg,#0f172a 0%,#1d4ed8 55%,#0ea5e9 100%);padding:36px;">
              <div style="font-size:28px;line-height:1;color:#ffffff;font-weight:800;">{{brandName}}</div>
              <div style="margin-top:8px;font-size:14px;line-height:1.6;color:rgba(255,255,255,0.78);">{{brandTagline}}</div>
              <div style="margin-top:24px;display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,0.16);font-size:12px;font-weight:700;letter-spacing:0.14em;color:#ffffff;">{{eyebrow}}</div>
              <h1 style="margin:20px 0 12px;font-size:36px;line-height:1.14;color:#ffffff;font-weight:800;letter-spacing:-0.04em;">{{headline}}</h1>
              <p style="margin:0;max-width:540px;font-size:16px;line-height:1.8;color:rgba(255,255,255,0.85);">{{summary}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:36px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                <tr>
                  <td style="padding:0 0 8px;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;">Order number</td>
                  <td align="right" style="padding:0 0 8px;font-size:16px;font-weight:700;color:#0f172a;">{{orderNumber}}</td>
                </tr>
                <tr>
                  <td style="padding:0 0 8px;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;">Placed at</td>
                  <td align="right" style="padding:0 0 8px;font-size:15px;color:#0f172a;">{{placedAt}}</td>
                </tr>
                <tr>
                  <td style="padding:0 0 18px;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;">Total</td>
                  <td align="right" style="padding:0 0 18px;font-size:22px;font-weight:800;color:#2563eb;">{{totalAmount}}</td>
                </tr>
              </table>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;border-top:1px solid #e2e8f0;">
                {{{itemsHtml}}}
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:0 36px 34px;">
              <a href="{{ctaUrl}}" style="display:inline-block;padding:14px 24px;border-radius:999px;background:linear-gradient(135deg,#2563eb 0%,#0ea5e9 100%);color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;">{{ctaLabel}}</a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 36px 34px;font-size:13px;line-height:1.8;color:#64748b;">
              Need help? Reach us at <a href="mailto:{{supportEmail}}" style="color:#2563eb;text-decoration:none;">{{supportEmail}}</a>.<br>
              &copy; {{currentYear}} {{brandName}}. All rights reserved.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
