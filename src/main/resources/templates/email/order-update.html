<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{brandName}}</title>
</head>
<body style="margin:0;padding:0;background:#f4efe8;font-family:Arial,sans-serif;color:#221a15;">
  <table role="presentation" style="width:100%;border-collapse:collapse;background:#f4efe8;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" style="width:100%;max-width:620px;border-collapse:collapse;background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 18px 48px rgba(0,0,0,0.08);">
          <tr>
            <td style="padding:28px 32px;background:linear-gradient(135deg,#201713,#40261b);color:#fff5ee;">
              <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#e7c2a8;">{{eyebrow}}</div>
              <h1 style="margin:14px 0 8px;font-size:32px;line-height:1.05;font-family:Arial,sans-serif;">{{headline}}</h1>
              <p style="margin:0;font-size:15px;line-height:1.6;color:#f1ddd0;">{{summary}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px;">
              <div style="padding:18px 20px;border-radius:18px;background:#f8f3ed;border:1px solid #eadfd4;">
                <div style="font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8b6c58;">{{highlightLabel}}</div>
                <div style="margin-top:8px;font-size:22px;font-weight:700;color:#241912;">{{highlightValue}}</div>
              </div>
              <p style="margin:22px 0 0;font-size:15px;line-height:1.7;color:#4d4037;">{{bodyLine}}</p>
              <div style="margin-top:26px;">
                <a href="{{ctaUrl}}" style="display:inline-block;padding:14px 24px;border-radius:999px;background:#df6d2b;color:#fff8f1;text-decoration:none;font-weight:700;">{{ctaLabel}}</a>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:18px 32px 28px;color:#7c6658;font-size:12px;line-height:1.6;">
              Need help? Reply to this email or contact {{supportEmail}}.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
