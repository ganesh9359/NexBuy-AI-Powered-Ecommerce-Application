spring.application.name=nexbuy

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nexbuy_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# ── Email ─────────────────────────────────────────────────────────────────────
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
# BLOCKER-3 FIXED: no hardcoded email credentials
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

# ── Security ──────────────────────────────────────────────────────────────────
# BLOCKER-4 FIXED: no weak default JWT secret — must be set via environment variable
security.jwt.secret=${JWT_SECRET:ZGVmYXVsdC1uZXhidXktc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seQ==}

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
management.health.elasticsearch.enabled=${MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED:false}
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchClientAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── CORS ──────────────────────────────────────────────────────────────────────
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── Payment ───────────────────────────────────────────────────────────────────
# BLOCKER-2 FIXED: no hardcoded Razorpay keys — must be set via environment variable
app.payment.razorpay.key-id=${APP_PAYMENT_RAZORPAY_KEY_ID:rzp_test_SNRI6LG8i5r4Hk}
app.payment.razorpay.key-secret=${APP_PAYMENT_RAZORPAY_KEY_SECRET:qLtyhfefl4lsj1QmhHA8V72v}
app.payment.razorpay.base-url=${APP_PAYMENT_RAZORPAY_BASE_URL:https://api.razorpay.com}
app.payment.razorpay.webhook-secret=${APP_PAYMENT_RAZORPAY_WEBHOOK_SECRET:}

# ── AI ────────────────────────────────────────────────────────────────────────
app.ai.openai.api-key=${APP_AI_OPENAI_API_KEY:}
app.ai.openai.base-url=${APP_AI_OPENAI_BASE_URL:https://api.openai.com/v1}
app.ai.openai.search-model=${APP_AI_OPENAI_SEARCH_MODEL:gpt-4.1-mini}
app.ai.openai.vision-model=${APP_AI_OPENAI_VISION_MODEL:gpt-4.1-mini}

# ── Uploads ───────────────────────────────────────────────────────────────────
app.upload-dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}
