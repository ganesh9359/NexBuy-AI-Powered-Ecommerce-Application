spring.datasource.url=jdbc:h2:mem:nexbuy_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Redis health check
management.health.redis.enabled=false
management.health.elasticsearch.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Disable Elasticsearch autoconfigure
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration

# JWT
security.jwt.secret=test-secret-key-must-be-at-least-32-chars!!

# Mail (no-op for tests)
spring.mail.host=localhost
spring.mail.port=3025

# Disable OAuth2
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
