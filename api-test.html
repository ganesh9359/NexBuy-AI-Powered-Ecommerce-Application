<!DOCTYPE html>
<html>
<head>
    <title>NexBuy API Test</title>
</head>
<body>
    <h1>NexBuy API Connection Test</h1>
    <div id="status">Testing...</div>
    <div id="result"></div>
    
    <h2>Test Results:</h2>
    <div id="tests"></div>
    
    <script>
        const API_BASE = 'https://nexbuy-backend-8k6a.onrender.com';
        
        async function runTests() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            const testsDiv = document.getElementById('tests');
            
            const tests = [
                { name: 'Categories', url: '/products/categories' },
                { name: 'Home Feed', url: '/products/home' },
                { name: 'All Products', url: '/products/catalog' },
                { name: 'Electronics Category', url: '/products/catalog?category=electronics' },
                { name: 'Mobiles Category', url: '/products/catalog?category=mobiles' }
            ];
            
            statusDiv.innerHTML = 'Running tests...';
            let results = [];
            
            for (const test of tests) {
                try {
                    const response = await fetch(`${API_BASE}${test.url}`);
                    const status = response.ok ? '✅ PASS' : `❌ FAIL (${response.status})`;
                    results.push(`<p><strong>${test.name}:</strong> ${status}</p>`);
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        results.push(`<p style="margin-left: 20px; color: red;">Error: ${errorText}</p>`);
                    }
                } catch (error) {
                    results.push(`<p><strong>${test.name}:</strong> ❌ FAIL (${error.message})</p>`);
                }
            }
            
            statusDiv.innerHTML = 'Tests completed!';
            testsDiv.innerHTML = results.join('');
        }
        
        runTests();
    </script>
</body>
</html>
